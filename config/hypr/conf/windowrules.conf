# Window and layer rules reference:
# https://wiki.hyprland.org/Configuring/Window-Rules/

# Floating TUI helper windows
windowrule {
    name = floating-tui
    match:class = TUI.float
    rounding = 20
    float = on
    size = 750 700
    center = on
}

# Layer rules: bars/launchers/panels

# Waybar
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

# Rofi
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.5, match:namespace rofi
layerrule = animation fade, match:namespace rofi

# SwayNC control center
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center

# Logout dialog
layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0.5, match:namespace logout_dialog

# Generic GTK layer shell clients
layerrule = blur on, match:namespace gtk4-layer-shell
layerrule = ignore_alpha 0.5, match:namespace gtk4-layer-shell

# AGS sidebar and backdrop
layerrule = blur on, match:namespace ags-sidebar
layerrule = ignore_alpha 0.5, match:namespace ags-sidebar
layerrule = animation slide right, match:namespace ags-sidebar
layerrule = animation fade, match:namespace ags-sidebar-backdrop

# Smart single-window behavior (tiled + visible only)
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
workspace = w[tv1], gapsout:0, gapsin:0

# Keep no border for fullscreen workspaces
windowrule = border_size 0, match:float 0, match:workspace f[1]

# Keep a minimum set of workspaces always available
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

# App-to-workspace rules
windowrule = match:class ^(ghostty|com\.mitchellh\.ghostty)$, workspace 1
windowrule = match:class ^(brave|brave-browser|Brave-browser)$, workspace 2
