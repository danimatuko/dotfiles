# Executed once on Hyprland session start

exec-once = hypridle                             # Sleep/idle management
exec-once = awww-daemon                          # Wallpaper daemon
exec-once = hyprsunset                           # Night light / color temperature
exec-once = canberra-gtk-play -i desktop-login   # Login sound
exec-once = cliphist daemon                      # Clipboard manager daemon
exec-once = wl-paste --watch cliphist store      # Clipboard manager watcher
exec-once = ags run ~/.config/ags/app.ts         # AGS app (bar, sidebar, notifications, quick settings)
exec-once = udiskie                              # Removable media automounter
