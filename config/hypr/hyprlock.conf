# BACKGROUND
background {
    monitor =
    path = ~/.cache/current-wallpaper
    blur_passes = 4
    blur_size = 10
    noise = 0.012
    contrast = 0.94
    brightness = 0.72
    vibrancy = 0.22
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    hide_cursor = false
}


# Day
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A")"
    color = rgba(238, 242, 248, 0.92)
    font_size = 66
    font_family = SF Pro Display Bold
    position = 0, 274
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B")"
    color = rgba(220, 226, 237, 0.84)
    font_size = 28
    font_family = SF Pro Display Bold
    position = 0, 198
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M -")</span>"
    color = rgba(220, 226, 237, 0.76)
    font_size = 17
    font_family = SF Pro Display Bold
    position = 0, 148
    halign = center
    valign = center
}

# Profile Icon Shell
shape {
    monitor =
    size = 132, 132
    color = rgba(18, 22, 30, 0.62)
    rounding = 14
    border_size = 1
    border_color = rgba(255, 255, 255, 0.24)
    rotate = 0
    xray = false

    position = -246, -142
    halign = center
    valign = center
}

# Profile Icon
label {
    monitor =
    text = 
    color = rgba(240, 244, 250, 0.94)
    font_size = 62
    font_family = JetBrains Mono Nerd Font Mono
    position = -246, -142
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 346, 58
    color = rgba(18, 22, 30, 0.54)
    rounding = 14
    border_size = 1
    border_color = rgba(255, 255, 255, 0.22)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 34, -108
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =   $USER
    color = rgba(238, 242, 248, 0.92)
    font_size = 20
    font_family = SF Pro Display Bold
    position = 34, -108
    halign = center
    valign = center
}

# KEYBOARD LAYOUT
label {
    monitor =
    text = ⌨  $LAYOUT
    color = rgba(216, 222, 233, 0.84)
    font_size = 20
    font_family = SF Pro Display Bold
    position = 34, -230
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 346, 62
    outline_thickness = 1
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.24)
    inner_color = rgba(18, 22, 30, 0.60)
    rounding = 14
    font_color = rgb(236, 240, 247)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffffaa">Type password...</span></i>
    hide_input = false
    position = 34, -180
    halign = center
    valign = center
}

# Reboot
label {
    monitor =
    text = 
    color = rgba(242, 246, 252, 0.82)
    font_size = 34
    font_family = JetBrains Mono Nerd Font Mono
    onclick = reboot now
    position = 0, 56
    halign = center
    valign = bottom
}

# Power off
label {
    monitor =
    text = 
    color = rgba(242, 246, 252, 0.82)
    font_size = 34
    font_family = JetBrains Mono Nerd Font Mono
    onclick = shutdown now
    position = 156, 56
    halign = center
    valign = bottom
}

# Suspend
label {
    monitor =
    text = 
    color = rgba(242, 246, 252, 0.82)
    font_size = 34
    font_family = JetBrains Mono Nerd Font Mono
    onclick = systemctl suspend
    position = -156, 56
    halign = center
    valign = bottom
}
