source = ~/.cache/current-theme/hyprlock.conf

# GENERAL
general {
  no_fade_in = true
  grace = 1
  disable_loading_bar = false
  hide_cursor = false
  ignore_empty_input = true
  text_trim = true
}

#BACKGROUND
background {
    monitor = 
    path = ~/.cache/current-wallpaper
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.7172
    vibrancy = 0.1696
    vibrancy_darkness = 0
}

# TIME HR
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +'%H')"
    color = $font_color
    shadow_pass = 2
    shadow_size = 3
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2
    font_size = 200
#    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    font_family = Alfa Slab One
    position = 0, 190
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +'%M')"
#    color = 0xff$color0
    color = $font_color
    font_size = 200
#    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    font_family = Alfa Slab One
    position = 0, -70
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +'%d %b %A')"
    color = $font_color
    font_size = 14
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -220
    halign = center
    valign = center
}


# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 0
    outer_color = $outer_color
    dots_size = 0.1 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 1 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    inner_color = $inner_color
    font_color = $font_color
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font Mono
    placeholder_text = <span foreground="##cdd6f4"> $USER</span>
    hide_input = false
    position = 0, -470
    halign = center
    valign = center
    zindex = 10
}
# POWER OPTIONS
label {
    monitor =
    text = 󰤄
    color = $font_color
    font_size = 50
    font_family = JetBrains Mono Nerd Font Mono
    onclick = systemctl suspend
    position = -130, 100
    halign = center
    valign = bottom
}

label {
    monitor =
    text = 󰜉
    color = $font_color
    font_size = 50
    font_family = JetBrains Mono Nerd Font Mono
    onclick = reboot
    position = 0, 100
    halign = center
    valign = bottom
}

label {
    monitor =
    text = 󰐥
    color = $font_color
    font_size = 50
    font_family = JetBrains Mono Nerd Font Mono
    onclick = poweroff
    position = 130, 100
    halign = center
    valign = bottom
}
